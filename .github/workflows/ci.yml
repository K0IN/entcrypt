name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions: read-all

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Build library
              run: go build ./...

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.11.0

            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

            - name: Run staticcheck
              run: staticcheck ./...

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

            - name: Run Gosec Security Scanner
              run: |
                  "$(go env GOPATH)/bin/gosec" -exclude-dir=pkg/mod -exclude-dir=examples/pkg/mod -fmt text ./...

    govulncheck:
        name: Govulncheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Test
              run: go test -v -shuffle=on -race -count=1 ./...

    coverage:
        name: Coverage
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Run tests with coverage
              run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Upload coverage
              uses: codecov/codecov-action@v7
              with:
                  file: coverage.out
                  fail_ci_error: false
