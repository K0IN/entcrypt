name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions: read-all

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Build library
              run: go build ./...

            - name: Build examples/noentc
              run: cd examples/noentc && go build ./...

            - name: Build examples/simple
              run: cd examples/simple && go build ./...

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.11.0

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1

            - name: Run Gosec Security Scanner
              run: |
                  "$(go env GOPATH)/bin/gosec" -fmt text ./...

    govulncheck:
        name: Govulncheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@latest

            - name: Run govulncheck
              run: govulncheck ./...

    test:
        name: Test (Go ${{ matrix.go-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                go-version: ["1.25", "1.26"]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ matrix.go-version }}
                  cache: true

            - name: Test
              run: go test -v -shuffle=on -race -count=1 ./...

            - name: Build example
              run: |
                  cd examples/noentc && go build ./...
                  cd ../simple && go build ./...

    coverage:
        name: Coverage
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Run tests with coverage
              run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Upload coverage
              uses: codecov/codecov-action@v7
              with:
                  file: coverage.out
                  fail_ci_error: false

            - name: Generate check
              run: |
                  cd examples/noentc
                  go generate ./ent
                  git diff --exit-code -- 'ent/entcrypt_gen.go' || \
                    echo "❌ entcrypt_gen.go is out of date — run 'go generate ./ent'"
