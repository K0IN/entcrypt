name: Stale

on:
    schedule:
        # Run daily at midnight UTC
        - cron: "0 0 * * *"
    workflow_dispatch:

# read-all default; job-level write required to label/close stale issues
permissions: read-all

jobs:
    stale:
        # issues:write + pull-requests:write — required for the stale action
        permissions:
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/stale@v9
              with:
                  stale-issue-message: >
                      This issue has been open for 60 days with no activity.
                      It will be closed in 14 days unless it's updated.
                  close-issue-message: >
                      This issue was closed because it has been stale for 14 days.
                  days-before-stale: 60
                  days-before-close: 14
                  stale-issue-label: "stale"
                  exempt-issue-labels: "pinned,security,help-wanted"
                  days-before-pr-stale: -1
                  days-before-pr-close: -1
