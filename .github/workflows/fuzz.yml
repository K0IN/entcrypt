name: Fuzzing

on:
    schedule:
        # Run daily at midnight UTC
        - cron: "0 0 * * *"
    workflow_dispatch:

permissions: read-all

jobs:
    fuzz:
        name: Fuzz Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  cache: true

            - name: Run fuzz tests
              run: go test -fuzz=FuzzEncryptDecryptRoundtrip -fuzztime=300s -timeout=10m ./...
